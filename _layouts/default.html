<!DOCTYPE html>
<html lang="en">
<head>

<!-- ══════════════════════════════════════════

══════════════════════════════════════════ -->
<div class="page-wrap">
  <div class="page-inner">

    <!-- Top tab navigation (mirrors sidebar nav) -->
    <nav class="top-nav">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' or page.url == '/index.html' %} class="active"{% endif %}>Home</a>
      <a href="{{ '/research/' | relative_url }}"{% if page.url contains 'research' %} class="active"{% endif %}>Research</a>
      <a href="{{ '/talks/' | relative_url }}"{% if page.url contains 'talks' %} class="active"{% endif %}>Talks &amp; Seminars</a>
      <a href="{{ '/resources/' | relative_url }}"{% if page.url contains 'resources' %} class="active"{% endif %}>Resources</a>
    </nav>

    {{ content }}

    <footer class="site-footer">
      © {{ 'now' | date: "%Y" }} Simone Cammarasana ·
      Powered by <a href="https://jekyllrb.com">Jekyll</a> ·
      Last updated: {{ 'now' | date: "%Y-%m-%d" }}

</html>
